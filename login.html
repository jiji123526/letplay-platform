<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>letsplay — 로그인</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f7f7f7; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 36px 28px; max-width: 360px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .title { font-size: 24px; font-weight: 500; text-align: center; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #999; text-align: center; margin-bottom: 28px; }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 10px; overflow: hidden; border: 1px solid #eee; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; background: #f8f8f8; color: #999; border: none; font-family: inherit; }
    .tab.active { background: #fff; color: #222; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: #888; font-weight: 600; margin-bottom: 6px; }
    .field input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 14px; font-family: inherit; outline: none; background: #f8f8f8; }
    .field input:focus { border-color: #3b8df0; }
    .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 14px; font-size: 15px; font-weight: 500; color: #fff; background: #3b8df0; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .google-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #fff; color: #333; border: 1.5px solid #e0e0e0; font-weight: 600; }
    .google-btn:hover { background: #f8f8f8; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #e8e8e8; }
    .divider span { font-size: 12px; color: #999; }
    .error { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }
    .success { color: #34c759; font-size: 12px; text-align: center; margin-top: 10px; }
    .signup-fields { display: none; }
    .signup-fields.active { display: block; }
    .login-fields.active { display: block; }
    .login-fields { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">💬 letsplay</div>
    <div class="subtitle">나만의 익명 채팅방 만들기</div>

    <div class="tabs">
      <button class="tab active" data-tab="login">로그인</button>
      <button class="tab" data-tab="signup">가입하기</button>
    </div>

    <div class="login-fields active" id="loginFields">
      <button class="btn google-btn" id="googleLoginBtn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google로 로그인
      </button>
      <div class="divider"><span>또는</span></div>
      <div class="field"><label>이메일</label><input type="email" id="loginEmail" /></div>
      <div class="field"><label>비밀번호</label><input type="password" id="loginPassword" /></div>
      <button class="btn" id="loginBtn">로그인</button>
    </div>

    <div class="signup-fields" id="signupFields">
      <button class="btn google-btn" id="googleSignupBtn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google로 가입하기
      </button>
      <div class="divider"><span>또는</span></div>
      <!-- Step 1: email + password -->
      <div id="signupStep1">
        <div class="field"><label>이메일</label><input type="email" id="signupEmail" /></div>
        <div class="field"><label>비밀번호</label><input type="password" id="signupPassword" placeholder="8자 이상, 숫자 포함" /></div>
        <button class="btn" id="signupBtn">인증 메일 발송</button>
      </div>
      <!-- Step 2: OTP verification -->
      <div id="signupStep2" style="display:none;">
        <div class="field">
          <label>인증 코드</label>
          <input type="text" id="otpInput" placeholder="이메일로 전송된 6자리 코드" maxlength="6" inputmode="numeric" />
          <div class="hint">이메일을 확인해주세요</div>
        </div>
        <button class="btn" id="verifyBtn">인증 확인</button>
        <button class="btn" id="resendBtn" style="background:#f4f4f4;color:#666;margin-top:8px;">인증 코드 재발송</button>
      </div>
    </div>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://xoqkmaeizhgjgrktktjf.supabase.co",
      "sb_publishable_QRpPwXj2V-ROceoR8fXYgg_5K9pvlbF"
    );

    const errorEl = document.getElementById("error");
    const successEl = document.getElementById("success");

    // Google OAuth login
    document.getElementById("googleLoginBtn").addEventListener("click", async () => {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + "/onboarding" }
      });
      if (error) { errorEl.textContent = error.message; }
    });

    // Google OAuth signup (same flow — Supabase auto-creates account on first sign-in)
    document.getElementById("googleSignupBtn").addEventListener("click", async () => {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + "/onboarding" }
      });
      if (error) { errorEl.textContent = error.message; }
    });

    // tab switching
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("loginFields").classList.toggle("active", tab.dataset.tab === "login");
        document.getElementById("signupFields").classList.toggle("active", tab.dataset.tab === "signup");
        errorEl.textContent = "";
        successEl.textContent = "";
      });
    });

    // login
    document.getElementById("loginBtn").addEventListener("click", async () => {
      errorEl.textContent = "";
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!email || !password) { errorEl.textContent = "모든 필드를 입력해주세요"; return; }

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { errorEl.textContent = "이메일 또는 비밀번호가 틀렸습니다"; return; }

      // redirect to onboarding (handles routing: has channel → chat, no channel → create)
      window.location.href = "/onboarding";
    });

    // signup — step 1: send verification email
    let signupEmail = "";
    let signupPassword = "";

    document.getElementById("signupBtn").addEventListener("click", async () => {
      errorEl.textContent = "";
      signupEmail = document.getElementById("signupEmail").value.trim();
      signupPassword = document.getElementById("signupPassword").value;

      if (!signupEmail || !signupPassword) { errorEl.textContent = "모든 필드를 입력해주세요"; return; }
      if (signupPassword.length < 8 || !/\d/.test(signupPassword)) { errorEl.textContent = "비밀번호는 8자 이상, 숫자를 포함해야 합니다"; return; }

      const { data, error } = await supabase.auth.signUp({ email: signupEmail, password: signupPassword });
      if (error) { errorEl.textContent = error.message; return; }

      // show OTP step
      document.getElementById("signupStep1").style.display = "none";
      document.getElementById("signupStep2").style.display = "block";
      successEl.textContent = "인증 코드를 이메일로 전송했습니다";
    });

    // signup — step 2: verify OTP
    document.getElementById("verifyBtn").addEventListener("click", async () => {
      errorEl.textContent = "";
      successEl.textContent = "";
      const otp = document.getElementById("otpInput").value.trim();

      if (!otp || otp.length !== 6) { errorEl.textContent = "6자리 인증 코드를 입력해주세요"; return; }

      const { data, error } = await supabase.auth.verifyOtp({
        email: signupEmail,
        token: otp,
        type: "signup",
      });
      if (error) { errorEl.textContent = "인증 코드가 올바르지 않습니다"; return; }

      // verified — auto login and redirect to onboarding
      window.location.href = "/onboarding";
    });

    // resend OTP
    document.getElementById("resendBtn").addEventListener("click", async () => {
      errorEl.textContent = "";
      const { error } = await supabase.auth.resend({ type: "signup", email: signupEmail });
      if (error) { errorEl.textContent = error.message; return; }
      successEl.textContent = "인증 코드를 다시 전송했습니다";
    });

    // if already logged in, redirect
    const session = localStorage.getItem("session");
    if (session) {
      window.location.href = "/onboarding";
    }
  </script>
</body>
</html>
