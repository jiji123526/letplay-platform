<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>letsplay — 채널 만들기</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f7f7f7; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 36px 28px; max-width: 360px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .title { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #999; text-align: center; margin-bottom: 28px; line-height: 1.6; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: #888; font-weight: 600; margin-bottom: 6px; }
    .field input { width: 100%; padding: 11px 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 14px; font-family: inherit; outline: none; background: #f8f8f8; }
    .field input:focus { border-color: #3b8df0; }
    .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
    .preview { font-size: 12px; color: #3b8df0; margin-top: 6px; font-weight: 500; }
    .btn { width: 100%; padding: 13px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; color: #fff; background: #3b8df0; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .error { color: #e74c3c; font-size: 12px; text-align: center; margin-top: 12px; min-height: 18px; }
    .step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; }
    .step-dot.active { background: #3b8df0; }
    .welcome-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="welcome-icon">🎉</div>
    <div class="title">채널 만들기</div>
    <div class="subtitle">나만의 익명 채팅방을 만들어 보세요!<br>채널 주소는 나중에 변경할 수 없습니다.</div>

    <div class="step-indicator">
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>

    <div id="step1">
      <div class="field">
        <label>채널 주소</label>
        <input type="text" id="slugInput" placeholder="my-channel" autocomplete="off" />
        <div class="hint">영문 소문자, 숫자, 하이픈 (3-30자)</div>
        <div class="preview" id="slugPreview"></div>
      </div>
      <div class="field">
        <label>채널 이름</label>
        <input type="text" id="nameInput" placeholder="표시될 이름" maxlength="30" />
      </div>
      <button class="btn" id="createBtn">채널 만들기</button>
    </div>

    <div class="error" id="error"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://xoqkmaeizhgjgrktktjf.supabase.co",
      "sb_publishable_QRpPwXj2V-ROceoR8fXYgg_5K9pvlbF"
    );

    const errorEl = document.getElementById("error");
    const slugInput = document.getElementById("slugInput");
    const nameInput = document.getElementById("nameInput");
    const slugPreview = document.getElementById("slugPreview");

    // check if user is logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = "/login";
    }

    // check if user already has a channel
    const { data: existingChannels } = await supabase
      .from("channels")
      .select("id")
      .eq("owner_uid", session.user.id);

    if (existingChannels && existingChannels.length > 0) {
      // already has a channel, redirect
      window.location.href = "/ch/" + existingChannels[0].id;
    }

    // slug preview
    slugInput.addEventListener("input", () => {
      const val = slugInput.value.trim().toLowerCase().replace(/[^a-z0-9-]/g, "");
      slugInput.value = val;
      slugPreview.textContent = val ? `yoursite.com/ch/${val}` : "";
    });

    // create channel
    document.getElementById("createBtn").addEventListener("click", async () => {
      errorEl.textContent = "";
      const slug = slugInput.value.trim().toLowerCase();
      const name = nameInput.value.trim();

      if (!slug) { errorEl.textContent = "채널 주소를 입력해주세요"; return; }
      if (slug.length < 3) { errorEl.textContent = "채널 주소는 3자 이상이어야 합니다"; return; }
      if (!/^[a-z0-9-]{3,30}$/.test(slug)) { errorEl.textContent = "영문 소문자, 숫자, 하이픈만 가능합니다"; return; }
      if (!name) { errorEl.textContent = "채널 이름을 입력해주세요"; return; }

      // check if slug exists
      const { data: existing } = await supabase.from("channels").select("id").eq("id", slug).single();
      if (existing) { errorEl.textContent = "이미 사용 중인 채널 주소입니다"; return; }

      // create channel
      const { error } = await supabase.from("channels").insert({
        id: slug,
        owner_uid: session.user.id,
        name: name,
      });

      if (error) {
        errorEl.textContent = error.message;
        return;
      }

      // redirect to the new channel
      window.location.href = "/ch/" + slug;
    });
  </script>
</body>
</html>
